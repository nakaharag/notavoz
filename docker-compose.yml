services:
  backend:
    build:
      context: ./backend
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - frontend

  frontend:
    build:
      context: ./frontend
    ports:
      - '3001:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
