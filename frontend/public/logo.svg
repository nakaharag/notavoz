<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="120" height="120" rx="24" fill="url(#gradient)"/>

  <!-- Microphone body -->
  <rect x="42" y="24" width="24" height="40" rx="12" fill="white"/>

  <!-- Microphone stand -->
  <path d="M54 68V78" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M44 78H64" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Microphone arc -->
  <path d="M34 52C34 63 43 72 54 72C65 72 74 63 74 52" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Sound waves -->
  <path d="M78 36C82 40 84 46 84 52C84 58 82 64 78 68" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M86 28C92 34 96 42 96 52C96 62 92 70 86 76" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Document with checkmark -->
  <rect x="68" y="70" width="28" height="32" rx="4" fill="white"/>
  <path d="M74 86L80 92L90 80" stroke="#5C7CFA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5C7CFA"/>
      <stop offset="100%" stop-color="#7C5CFA"/>
    </linearGradient>
  </defs>
</svg>
